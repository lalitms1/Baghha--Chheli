<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>7D Cyber-Hunter: Dimension X</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --glass: rgba(0, 10, 20, 0.8);
        }
        
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; user-select: none; }
        
        /* --- UI OVERLAYS --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let clicks pass through to 3D canvas */
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .pointer-events-auto { pointer-events: auto; }

        .hud-panel {
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 15px; margin: 20px;
            border-radius: 8px;
            text-align: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        h1 { margin: 0; font-size: 1.5rem; text-shadow: 0 0 10px var(--neon-blue); color: var(--neon-blue); }
        
        .btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 10px 20px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            pointer-events: auto; margin-top: 10px;
        }
        .btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        .btn-red { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-red:hover { background: var(--neon-red); }

        /* Turn Indicator */
        #turn-indicator {
            font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px currentColor;
        }

        /* Loading Screen */
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; align-items: center; justify-content: center;
            color: var(--neon-blue); font-size: 2rem; z-index: 999;
        }
        
        #controls-hint {
            position: absolute; bottom: 20px; right: 20px;
            color: rgba(255,255,255,0.5); font-size: 0.8rem;
            text-align: right; pointer-events: none;
        }

        /* Menu Modal */
        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); border: 2px solid var(--neon-blue);
            padding: 40px; text-align: center; z-index: 100; pointer-events: auto;
            display: none; box-shadow: 0 0 50px var(--neon-blue);
        }
        .modal.active { display: block; }

    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">INITIALIZING 7D MATRIX...</div>

    <div id="ui-layer">
        <div class="hud-panel pointer-events-auto" style="align-self: flex-start;">
            <div id="turn-indicator" style="color: #00f3ff">DEFENDER (GOAT) TURN</div>
            <div style="font-size: 0.8rem; margin-top: 5px;">
                UNITS: <span id="ui-placed">0</span>/20 | LOSSES: <span id="ui-dead">0</span>/5
            </div>
        </div>

        <div style="position: absolute; top: 20px; right: 20px;" class="pointer-events-auto">
            <button class="btn" onclick="showMenu()">MENU</button>
        </div>

        <div class="hud-panel pointer-events-auto" style="align-self: center; margin-bottom: 30px;">
            <div id="msg-box" style="margin-bottom: 10px; color: #ffeb3b;">SELECT TARGET COORDINATES</div>
        </div>
    </div>

    <div id="controls-hint">
        ROTATE: Left Click + Drag<br>
        ZOOM: Scroll Wheel<br>
        PAN: Right Click + Drag
    </div>

    <div id="menu-modal" class="modal active">
        <h1>DIMENSION X</h1>
        <p style="color: #aaa; margin-bottom: 20px;">HOLOGRAPHIC STRATEGY ENGINE</p>
        <button class="btn" onclick="startGame('friend')" style="width: 100%; margin-bottom: 10px;">PvP (LOCAL)</button>
        <button class="btn" onclick="startGame('computer')" style="width: 100%;">PvE (COMPUTER)</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- GAME LOGIC VARIABLES ---
        const TIGER = 2, GOAT = 1, EMPTY = 0;
        let board = Array(25).fill(EMPTY);
        let turn = 'goat';
        let phase = 1;
        let goatsPlaced = 0, goatsDead = 0;
        let selectedIdx = null;
        let gameMode = 'friend';
        let gameOver = false;
        let isWait = false; // Prevents clicks during AI turn

        // Adjacency
        const ADJ = {};
        for(let i=0; i<25; i++) {
            ADJ[i]=[]; 
            let r=Math.floor(i/5), c=i%5;
            [[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>{let nr=r+d[0],nc=c+d[1]; if(nr>=0&&nr<5&&nc>=0&&nc<5) ADJ[i].push(nr*5+nc)});
            if(i%2===0) [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(d=>{let nr=r+d[0],nc=c+d[1]; if(nr>=0&&nr<5&&nc>=0&&nc<5) ADJ[i].push(nr*5+nc)});
        }

        // --- THREE.JS VARIABLES ---
        let scene, camera, renderer, controls, composer;
        let raycaster, mouse;
        const nodes = []; 
        const pieces = []; 
        const particles = []; 

        // Colors
        const COL_GOAT = 0x00f3ff;
        const COL_TIGER = 0xff003c;
        const COL_LINE = 0x222244;
        const COL_SELECT = 0xffff00;

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if(audioCtx.state==='suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if(type==='select') {
                osc.type='sine'; osc.frequency.setValueAtTime(800, now);
                g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now+0.1);
                osc.start(now); osc.stop(now+0.1);
            } else if(type==='move') {
                osc.type='triangle'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(600, now+0.3);
                g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now+0.3);
                osc.start(now); osc.stop(now+0.3);
            } else if(type==='eat') {
                osc.type='sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now+0.4);
                g.gain.setValueAtTime(0.3, now); g.gain.linearRampToValueAtTime(0, now+0.4);
                osc.start(now); osc.stop(now+0.4);
            }
        }

        // --- INIT 3D WORLD ---
        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 15);
            camera.lookAt(0,0,0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0; bloomPass.strength = 1.2; bloomPass.radius = 0.5;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2;

            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);
            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 20, 0);
            scene.add(pointLight);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('click', onMouseClick);
            window.addEventListener('resize', onWindowResize);

            createBoardVisuals();
            createStarfield();

            document.getElementById('loader').style.display = 'none';
            animate();
        }

        function createBoardVisuals() {
            const material = new THREE.LineBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.3 });
            const points = [];
            
            for(let i=0; i<25; i++) {
                ADJ[i].forEach(n => {
                    if(n > i) {
                        let p1 = getCoord(i);
                        let p2 = getCoord(n);
                        points.push(new THREE.Vector3(p1.x, 0, p1.z));
                        points.push(new THREE.Vector3(p2.x, 0, p2.z));
                    }
                });
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const lines = new THREE.LineSegments(geometry, material);
            scene.add(lines);

            const nodeGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 16);
            const nodeMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.0 });
            const wireMat = new THREE.MeshBasicMaterial({ color: 0x111122, wireframe:true });

            for(let i=0; i<25; i++) {
                let pos = getCoord(i);
                
                const base = new THREE.Mesh(nodeGeo, wireMat);
                base.position.set(pos.x, -0.1, pos.z);
                scene.add(base);

                const hitbox = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), nodeMat);
                hitbox.position.set(pos.x, 0, pos.z);
                hitbox.userData = { index: i, type: 'node' };
                scene.add(hitbox);
                nodes.push(hitbox);
                
                pieces.push(null);
            }
        }

        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for ( let i = 0; i < 2000; i ++ ) {
                vertices.push( THREE.MathUtils.randFloatSpread( 200 ) );
                vertices.push( THREE.MathUtils.randFloatSpread( 200 ) );
                vertices.push( THREE.MathUtils.randFloatSpread( 200 ) );
            }
            geometry.setAttribute( 'position', new THREE.Float32BufferAttribute( vertices, 3 ) );
            const particles = new THREE.Points( geometry, new THREE.PointsMaterial( { color: 0x888888, size: 0.5 } ) );
            scene.add( particles );
        }

        function getCoord(idx) {
            const row = Math.floor(idx / 5);
            const col = idx % 5;
            return { x: (col - 2) * 3, z: (row - 2) * 3 };
        }

        // --- GAMEPLAY VISUALS ---
        function spawnPiece(idx, type) {
            const pos = getCoord(idx);
            let mesh;

            if(type === TIGER) {
                const geo = new THREE.IcosahedronGeometry(0.8, 0);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: COL_TIGER, emissive: COL_TIGER, emissiveIntensity: 2, roughness: 0.2, metalness: 0.8 
                });
                mesh = new THREE.Mesh(geo, mat);
            } else {
                const geo = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: COL_GOAT, emissive: COL_GOAT, emissiveIntensity: 1.5, transparent:true, opacity: 0.9
                });
                mesh = new THREE.Mesh(geo, mat);
            }

            mesh.position.set(pos.x, 5, pos.z); 
            mesh.userData = { id: idx, type: type };
            mesh.targetY = 0.5;
            
            scene.add(mesh);
            pieces[idx] = mesh;
        }

        function moveVisualPiece(from, to) {
            const mesh = pieces[from];
            pieces[from] = null;
            pieces[to] = mesh;
            
            const target = getCoord(to);
            mesh.targetPos = { x: target.x, z: target.z };
            mesh.isMoving = true;
        }

        function removePiece(idx) {
            const mesh = pieces[idx];
            if(mesh) {
                createExplosion(mesh.position, mesh.userData.type === TIGER ? COL_TIGER : COL_GOAT);
                scene.remove(mesh);
                pieces[idx] = null;
            }
        }

        function createExplosion(pos, color) {
            for(let i=0; i<15; i++) {
                const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const mat = new THREE.MeshBasicMaterial({ color: color });
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                
                p.vel = new THREE.Vector3(
                    (Math.random()-0.5)*0.5, 
                    (Math.random())*0.5, 
                    (Math.random()-0.5)*0.5
                );
                p.life = 1.0;
                scene.add(p);
                particles.push(p);
            }
        }

        // --- CORE GAME LOGIC ---
        window.startGame = function(mode) {
            gameMode = mode;
            document.getElementById('menu-modal').classList.remove('active');
            
            board.fill(EMPTY);
            pieces.forEach(p => { if(p) scene.remove(p); });
            pieces.fill(null);
            
            [0,4,20,24].forEach(i => { board[i]=TIGER; spawnPiece(i, TIGER); });

            turn = 'goat'; phase = 1; goatsPlaced = 0; goatsDead = 0;
            selectedIdx = null; gameOver = false; isWait = false;
            updateHUD();
        }

        window.showMenu = function() {
            document.getElementById('menu-modal').classList.add('active');
        }

        function onMouseClick(event) {
            if(gameOver || isWait) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            
            if(intersects.length > 0) {
                const idx = intersects[0].object.userData.index;
                playSfx('select');
                
                if(turn === 'goat') handleGoatInput(idx);
                else handleTigerInput(idx);
            }
        }

        function handleGoatInput(idx) {
            if(phase === 1) {
                if(board[idx] === EMPTY) executeAction(null, idx, 'place');
            } else {
                if(board[idx] === GOAT) { selectedIdx = idx; highlight(idx); }
                else if(board[idx] === EMPTY && selectedIdx !== null) {
                    if(ADJ[selectedIdx].includes(idx)) executeAction(selectedIdx, idx, 'move');
                }
            }
        }

        function handleTigerInput(idx) {
            if(board[idx] === TIGER) { selectedIdx = idx; highlight(idx); }
            else if(board[idx] === EMPTY && selectedIdx !== null) {
                if(ADJ[selectedIdx].includes(idx)) executeAction(selectedIdx, idx, 'move');
                else {
                    let mid = getJump(selectedIdx, idx);
                    if(mid !== -1) executeAction(selectedIdx, idx, 'eat', mid);
                }
            }
        }

        function executeAction(from, to, type, mid=null) {
            if(type === 'place') {
                board[to] = GOAT; goatsPlaced++;
                if(goatsPlaced===20) phase=2;
                spawnPiece(to, GOAT);
            } else if(type === 'move') {
                board[to] = board[from]; board[from] = EMPTY;
                moveVisualPiece(from, to);
            } else if(type === 'eat') {
                board[to] = TIGER; board[from] = EMPTY; board[mid] = EMPTY;
                goatsDead++;
                moveVisualPiece(from, to);
                removePiece(mid);
                playSfx('eat');
            }
            
            if(type !== 'eat') playSfx('move');

            selectedIdx = null;
            clearHighlights();
            updateHUD();

            // CHECK WIN CONDITIONS IMMEDIATELY 
            if (checkWinConditions()) return;

            // Strict turn switching
            turn = (turn === 'goat') ? 'tiger' : 'goat';
            updateHUD();

            // Trigger AI safely if it's PvE mode
            if (gameMode === 'computer' && turn === 'tiger') {
                isWait = true; // Block human clicks until AI is done
                setTimeout(aiMove, 800);
            } else {
                isWait = false; // Give control back to player
            }
        }

        function checkWinConditions() {
            // Hunter Win
            if (goatsDead >= 5) {
                gameOver = true;
                setTimeout(() => { 
                    alert('HUNTERS (TIGERS) WIN! 5 Goats Eliminated.'); 
                    showMenu(); 
                }, 500);
                return true;
            }

            // Defender Win
            let tigers = board.map((v,i) => v === TIGER ? i : -1).filter(i => i !== -1);
            if (tigers.length > 0) {
                let trapped = true;
                
                for (let t of tigers) {
                    let canMove = false;
                    
                    // Check adjacent empty spots
                    ADJ[t].forEach(n => { if (board[n] === EMPTY) canMove = true; });
                    
                    // Check valid jumps
                    for (let i = 0; i < 25; i++) {
                        if (board[i] === EMPTY && getJump(t, i) !== -1) canMove = true;
                    }
                    
                    if (canMove) { trapped = false; break; }
                }

                if (trapped) {
                    gameOver = true;
                    setTimeout(() => { 
                        alert('DEFENDERS (GOATS) WIN! All Tigers are fully trapped!'); 
                        showMenu(); 
                    }, 500);
                    return true;
                }
            }
            return false;
        }

        function getJump(f, t) {
            let r1=Math.floor(f/5), c1=f%5, r2=Math.floor(t/5), c2=t%5;
            let dr=r2-r1, dc=c2-c1;
            if((Math.abs(dr)===2 && dc===0) || (Math.abs(dc)===2 && dr===0) || (Math.abs(dr)===2 && Math.abs(dc)===2)) {
                let m = (r1+dr/2)*5 + (c1+dc/2);
                if(ADJ[f].includes(m) && ADJ[m].includes(t) && board[m]===GOAT) return m;
            }
            return -1;
        }

        // --- COMPUTER AI ---
        function aiMove() {
            if (gameOver || turn !== 'tiger') return; // Absolute fail-safe

            let tigers = board.map((v,i)=>v===TIGER?i:-1).filter(i=>i!==-1);
            
            // 1. Capture if possible
            for(let t of tigers) {
                for(let i=0; i<25; i++) {
                    if(board[i]===EMPTY) {
                        let m = getJump(t, i);
                        if(m !== -1) {
                            executeAction(t, i, 'eat', m);
                            return; 
                        }
                    }
                }
            }
            
            // 2. Random valid move
            let moves = [];
            for(let t of tigers) {
                ADJ[t].forEach(n=>{ if(board[n]===EMPTY) moves.push({f:t, t:n}); });
            }
            
            if(moves.length>0) {
                let mv = moves[Math.floor(Math.random()*moves.length)];
                executeAction(mv.f, mv.t, 'move');
            } 
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            pieces.forEach(p => {
                if(p) {
                    if(!p.isMoving) p.position.y += Math.sin(Date.now() * 0.003) * 0.002;

                    if(p.position.y > 0.5 && !p.isMoving) {
                        p.position.y = THREE.MathUtils.lerp(p.position.y, 0.5, 0.1);
                    }

                    if(p.isMoving) {
                        p.position.x = THREE.MathUtils.lerp(p.position.x, p.targetPos.x, 0.1);
                        p.position.z = THREE.MathUtils.lerp(p.position.z, p.targetPos.z, 0.1);
                        if(Math.abs(p.position.x - p.targetPos.x) < 0.01 && Math.abs(p.position.z - p.targetPos.z) < 0.01) {
                            p.isMoving = false;
                        }
                    }
                    
                    if(p.userData.type === TIGER) {
                        p.rotation.x += 0.01; p.rotation.y += 0.01;
                    }
                }
            });

            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.position.add(p.vel);
                p.life -= 0.02;
                p.scale.setScalar(p.life);
                if(p.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }

            composer.render();
        }

        // --- VISUAL HELPERS ---
        function highlight(idx) {
            clearHighlights();
            const pos = getCoord(idx);
            const ringGeo = new THREE.RingGeometry(1, 1.2, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: COL_SELECT, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(pos.x, 0.1, pos.z);
            ring.rotation.x = -Math.PI / 2;
            ring.name = 'highlight';
            scene.add(ring);
        }

        function clearHighlights() {
            const obj = scene.getObjectByName('highlight');
            if(obj) scene.remove(obj);
        }

        function updateHUD() {
            const tDiv = document.getElementById('turn-indicator');
            const mDiv = document.getElementById('msg-box');
            if(turn==='goat') {
                tDiv.innerText = "DEFENDER (GOAT) TURN"; tDiv.style.color = "#00f3ff";
                mDiv.innerText = phase===1 ? "DEPLOY UNITS" : "REPOSITION UNITS";
            } else {
                tDiv.innerText = "HUNTER (TIGER) TURN"; tDiv.style.color = "#ff003c";
                mDiv.innerText = "ELIMINATE TARGETS";
            }
            document.getElementById('ui-placed').innerText = goatsPlaced;
            document.getElementById('ui-dead').innerText = goatsDead;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        init3D();
    </script>
</body>
</html>
